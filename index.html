<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Connexion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-icon">🛡️</div>
        <div class="login-brand-title">Coin des Étudiants</div>
        <div class="login-brand-sub">Panneau d'administration</div>
      </div>

      <div class="login-error" id="error-box"></div>

      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input class="form-input" type="email" id="email" placeholder="admin@coindesetudiants.fr" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-login" id="login-btn" onclick="handleLogin()">Se connecter</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
  <script>
    // Already logged in as admin → redirect
    sb.auth.getSession().then(async ({ data: { session } }) => {
      if (!session) return;
      const { data: p } = await sb.from('profiles').select('role').eq('id', session.user.id).single();
      if (p?.role === 'admin') window.location.href = 'dashboard.html';
    });

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const errBox   = document.getElementById('error-box');

      errBox.classList.remove('visible');
      if (!email || !password) { showError('Veuillez remplir tous les champs.'); return; }

      btn.disabled = true;
      btn.textContent = 'Connexion…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error || !data.user) {
        btn.disabled = false; btn.textContent = 'Se connecter';
        showError('Email ou mot de passe incorrect.');
        return;
      }

      const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();

      if (!profile || profile.role !== 'admin') {
        await sb.auth.signOut();
        btn.disabled = false; btn.textContent = 'Se connecter';
        showError('Accès refusé. Ce compte n\'a pas les droits administrateur.');
        return;
      }

      window.location.href = 'dashboard.html';
    }

    function showError(msg) {
      const b = document.getElementById('error-box');
      b.textContent = msg;
      b.classList.add('visible');
    }
  </script>
</body>
</html>
