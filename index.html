  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-wrap" id="login-logo-wrap">
          <img src="https://sovelwnthvqtgtvxfpsj.supabase.co/storage/v1/object/public/avatars/logo.png"
               alt="CDE" style="width:100%;height:100%;object-fit:cover;display:block"
               onerror="document.getElementById('login-logo-wrap').style.display='none';document.getElementById('login-logo-fb').style.display='flex'" />
        </div>
        <div class="login-logo-fallback" id="login-logo-fb">CDE</div>
        <div class="login-brand">Coin des Étudiants</div>
        <div class="login-brand-sub">Panneau d'administration</div>
      </div>

      <div class="error-box" id="err-box"></div>

      <p class="login-form-title">Connexion administrateur</p>

      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input class="form-input" type="email" id="email"
               placeholder="admin@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="pwd">Mot de passe</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="pwd"
                 placeholder="••••••••" autocomplete="current-password" />
          <button class="input-eye" type="button" id="eye-btn" onclick="toggleEye()">👁</button>
        </div>
      </div>

      <button class="btn-login" id="submit-btn" onclick="handleLogin()">
        Se connecter
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
  <script>
    let showPwd = false;
    function toggleEye() {
      showPwd = !showPwd;
      document.getElementById('pwd').type = showPwd ? 'text' : 'password';
      document.getElementById('eye-btn').textContent = showPwd ? '🙈' : '👁';
    }

    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    // Already logged in → redirect
    if (localStorage.getItem('cde_admin_session')) {
      window.location.href = 'dashboard.html';
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const pwd   = document.getElementById('pwd').value;
      const btn   = document.getElementById('submit-btn');

      document.getElementById('err-box').classList.remove('visible');
      if (!email || !pwd) { showErr('Veuillez remplir tous les champs.'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spin-sm"></span> Connexion…';

      const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
      if (error || !data.user) {
        btn.disabled = false; btn.innerHTML = 'Se connecter';
        showErr('Email ou mot de passe incorrect.'); return;
      }

      const { data: profile } = await sb
        .from('profiles')
        .select('role, nom, prenom')
        .eq('id', data.user.id)
        .maybeSingle();

      if (!profile || profile.role !== 'admin') {
        await sb.auth.signOut();
        btn.disabled = false; btn.innerHTML = 'Se connecter';
        showErr('Accès refusé. Compte admin requis.'); return;
      }

      localStorage.setItem('cde_admin_session', JSON.stringify({
        id: data.user.id,
        nom: profile.nom,
        prenom: profile.prenom,
        email: data.user.email,
        access_token: data.session.access_token,
      }));

      window.location.href = 'dashboard.html';
    }

    function showErr(msg) {
      const b = document.getElementById('err-box');
      b.textContent = msg;
      b.classList.add('visible');
    }
  </script>
</body>
</html>
