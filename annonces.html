  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

    window.SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvdmVsd250aHZxdGd0dnhmcHNqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTg1NzkwMiwiZXhwIjoyMDk3NDMzOTAyfQ.DhDZJ_hov0CVZcmubcE-2fbxRNepUjQyZzaaaamDRSE';
  </script>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>
    <div class="main-content">
      <header class="topbar">
        <div>
          <div class="page-title">Annonces</div>
          <div class="page-sub" id="ann-sub"></div>
        </div>
        <div class="topbar-right">
          <div class="admin-chip" id="admin-chip"></div>
        </div>
      </header>

      <main class="content">
        <div class="toolbar">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input class="search-input" id="search" type="text" placeholder="Rechercher par titre…" oninput="applyFilters()" />
          </div>
          <div class="filter-pills">
            <button class="filter-pill active" onclick="setStatus(this,'')">Toutes</button>
            <button class="filter-pill" onclick="setStatus(this,'actif')">Actives</button>
            <button class="filter-pill" onclick="setStatus(this,'signale')">⚠️ Signalées</button>
            <button class="filter-pill" onclick="setStatus(this,'suspendu')">Suspendues</button>
          </div>
        </div>

        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Annonce</th>
                <th>Catégorie</th>
                <th>Auteur</th>
                <th>Prix</th>
                <th>Signalements</th>
                <th>Statut</th>
                <th>Date</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="ann-tbody">
              <tr><td colspan="8" style="text-align:center;padding:32px;color:var(--sub)">Chargement…</td></tr>
            </tbody>
          </table>
          <div id="ann-pagination"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal détail annonce -->
  <div class="modal-backdrop hidden" id="modal-ann">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-ann-title"></div>
          <div style="font-size:12px;color:var(--sub);margin-top:3px" id="modal-ann-sub"></div>
        </div>
        <button class="modal-close" onclick="closeAnn()">✕</button>
      </div>
      <div class="modal-body">
        <div class="detail-grid" id="modal-ann-fields"></div>
        <div class="sep"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-green btn-sm" id="btn-restore"     onclick="changeStatus('actif')">✓ Restaurer</button>
          <button class="btn btn-amber btn-sm" id="btn-suspend-ann" onclick="changeStatus('suspendu')">⛔ Suspendre</button>
          <button class="btn btn-red btn-sm"                        onclick="deleteAnn()">🗑 Supprimer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
  <script>
    let allAnnonces = [], filtered = [], currentPage = 1, activeStatus = '', selectedAnn = null;

    const urlStatus = new URLSearchParams(location.search).get('filter');
    if (urlStatus) activeStatus = urlStatus;

    function gotoPage(n) { currentPage = n; renderTable(); }

    function setStatus(btn, status) {
      activeStatus = status;
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase();
      filtered = allAnnonces.filter(a => {
        const matchStatus = !activeStatus || a.statut === activeStatus;
        return matchStatus && (!q || (a.titre??'').toLowerCase().includes(q));
      });
      currentPage = 1;
      renderTable();
    }

    function renderTable() {
      const page  = paginate(filtered, currentPage);
      const tbody = document.getElementById('ann-tbody');

      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Aucune annonce trouvée</div></div></td></tr>`;
        document.getElementById('ann-pagination').innerHTML = '';
        return;
      }

      tbody.innerHTML = page.map(a => {
        const auteur = a.auteur ? `${a.auteur.prenom??''} ${a.auteur.nom??''}`.trim() : '—';
        const sig = a.nb_signalements > 0
          ? `<span class="badge badge-red">⚠️ ${a.nb_signalements}</span>`
          : '<span style="color:var(--sub)">—</span>';
        const catColor = {logement:'#EBF2FA',emploi:'#ECFDF5',services:'#F5F3FF',dons:'#FEF2F2',bons_plans:'#FFFBEB'}[a.categorie]??'#F3F4F6';
        const catText  = {logement:'#1E5AA8',emploi:'#1A7B23',services:'#7C3AED',dons:'#C0392B',bons_plans:'#92400E'}[a.categorie]??'#647488';
        return `<tr onclick="openAnn('${a.id}')">
          <td><div style="font-weight:600;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.titre??'—'}</div></td>
          <td><span class="badge" style="background:${catColor};color:${catText}">${CAT_ICON[a.categorie]??'📋'} ${a.categorie??'—'}</span></td>
          <td>${auteur}</td>
          <td>${a.prix ? a.prix+'€' : '—'}</td>
          <td>${sig}</td>
          <td>${statusBadge(a.statut)}</td>
          <td style="white-space:nowrap">${fmtDate(a.created_at)}</td>
          <td><button class="btn btn-ghost btn-sm">Voir</button></td>
        </tr>`;
      }).join('');

      renderPagination('ann-pagination', filtered.length, currentPage);
      document.getElementById('ann-sub').textContent =
        `${filtered.length} annonce${filtered.length!==1?'s':''}${activeStatus ? ' — filtrées' : ''}`;
    }

    function openAnn(id) {
      selectedAnn = allAnnonces.find(a => a.id === id);
      if (!selectedAnn) return;
      const a = selectedAnn;
      const auteur = a.auteur ? `${a.auteur.prenom??''} ${a.auteur.nom??''}`.trim() : '—';

      document.getElementById('modal-ann-title').textContent = a.titre ?? '—';
      document.getElementById('modal-ann-sub').textContent =
        `${CAT_ICON[a.categorie]??'📋'} ${a.categorie??''} · ${a.ville??''}`;

      const fields = [
        ['Statut', statusBadge(a.statut)],
        ['Auteur', auteur],
        ['Prix', a.prix ? a.prix+'€' : '—'],
        ['Ville', a.ville??'—'],
        ['Signalements', a.nb_signalements>0 ? `<span class="badge badge-red">⚠️ ${a.nb_signalements}</span>` : '0'],
        ['Publiée le', fmtDate(a.created_at)],
        ['Description', a.description??'—'],
      ];

      document.getElementById('modal-ann-fields').innerHTML = fields.map(([k,v],i) =>
        `<div${i===fields.length-1?' class="detail-full"':''}><div class="detail-key">${k}</div><div class="detail-val">${v}</div></div>`
      ).join('');

      document.getElementById('btn-restore').style.display     = a.statut==='suspendu' ? 'inline-flex' : 'none';
      document.getElementById('btn-suspend-ann').style.display = a.statut!=='suspendu' ? 'inline-flex' : 'none';
      openModal('modal-ann');
    }

    function closeAnn() { closeModal('modal-ann'); selectedAnn = null; }

    async function changeStatus(newStatus) {
      if (!selectedAnn) return;
      const label = newStatus === 'actif' ? 'Restaurer cette annonce ?' : 'Suspendre cette annonce ?';
      showConfirm(label, async () => {
        showSpinner();
        const updates = { statut: newStatus };
        if (newStatus === 'actif') updates.nb_signalements = 0;
        await sb.from('annonces').update(updates).eq('id', selectedAnn.id);
        hideSpinner();
        toast(newStatus === 'actif' ? 'Annonce restaurée ✓' : 'Annonce suspendue');
        closeAnn();
        await loadAnnonces();
      }, { label: newStatus === 'actif' ? 'Restaurer' : 'Suspendre', danger: newStatus !== 'actif' });
    }

    function deleteAnn() {
      if (!selectedAnn) return;
      showConfirm(`Supprimer définitivement "${selectedAnn.titre}" ?`, async () => {
        showSpinner();
        await sb.from('annonces').delete().eq('id', selectedAnn.id);
        hideSpinner();
        toast('Annonce supprimée');
        closeAnn();
        await loadAnnonces();
      }, { danger: true, label: 'Supprimer', title: 'Supprimer l\'annonce' });
    }

    async function loadAnnonces() {
      const { data } = await sb.from('annonces')
        .select('*,auteur:auteur_id(nom,prenom)')
        .order('created_at', { ascending: false });
      allAnnonces = data ?? [];

      if (urlStatus) {
        document.querySelectorAll('.filter-pill').forEach(b => {
          const active = b.getAttribute('onclick')?.includes(`'${urlStatus}'`);
          b.classList.toggle('active', active);
        });
      }
      applyFilters();
    }

    (async () => {
      const auth = await initPage('annonces');
      if (!auth) return;
      await loadAnnonces();
    })();
  </script>
</body>
</html>
