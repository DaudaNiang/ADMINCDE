<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificats — Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <div id="sidebar-placeholder"></div>

    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:14px">
          <div class="topbar-title">Certificats à valider</div>
          <span class="topbar-badge" id="pending-badge" style="display:none"></span>
        </div>
      </div>

      <div class="content">
        <div id="pending-list"><div style="padding:20px;text-align:center;color:var(--sub)">Chargement…</div></div>

        <div class="section-title" style="margin-top:32px">Déjà traités</div>
        <div id="done-list"></div>
      </div>
    </div>
  </div>

  <!-- Modal valider -->
  <div class="modal-overlay hidden" id="modal-validate">
    <div class="modal-card">
      <div class="modal-icon">✅</div>
      <div class="modal-title" id="modal-validate-title"></div>
      <div class="modal-sub">L'utilisateur recevra un email de confirmation.</div>
      <div class="modal-btn-row">
        <button class="btn-cancel" onclick="closeModal('modal-validate')">Annuler</button>
        <button class="btn-confirm" id="modal-validate-confirm">Confirmer</button>
      </div>
    </div>
  </div>

  <!-- Modal refuser -->
  <div class="modal-overlay hidden" id="modal-refuse">
    <div class="modal-card">
      <div class="modal-icon">❌</div>
      <div class="modal-title" id="modal-refuse-title"></div>
      <textarea class="motif-textarea" id="motif-input" placeholder="Motif du refus (optionnel)"></textarea>
      <div class="modal-btn-row">
        <button class="btn-cancel" onclick="closeModal('modal-refuse')">Annuler</button>
        <button class="btn-confirm btn-confirm-red" id="modal-refuse-confirm">Confirmer le refus</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
  <script>
    let pendingCerts = [];
    let doneCerts = [];

    function closeModal(id) {
      document.getElementById(id).classList.add('hidden');
    }

    async function loadCerts() {
      const { data: pending } = await sb.from('certificats')
        .select('*, profiles:etudiant_id (nom, prenom, email)')
        .eq('statut', 'en_attente')
        .order('created_at', { ascending: true });

      const { data: done } = await sb.from('certificats')
        .select('*, profiles:etudiant_id (nom, prenom, email)')
        .in('statut', ['valide', 'refuse'])
        .order('created_at', { ascending: false })
        .limit(20);

      pendingCerts = pending ?? [];
      doneCerts = done ?? [];
      renderPending();
      renderDone();

      const badge = document.getElementById('pending-badge');
      if (pendingCerts.length > 0) {
        badge.textContent = `${pendingCerts.length} en attente`;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }

    function certName(cert) {
      return `${cert.profiles?.prenom ?? ''} ${cert.profiles?.nom ?? ''}`.trim();
    }

    function renderPending() {
      const el = document.getElementById('pending-list');
      if (pendingCerts.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">✅</div><div>Aucun certificat en attente</div></div>`;
        return;
      }
      el.innerHTML = pendingCerts.map(cert => `
        <div class="cert-card" id="cert-${cert.id}">
          <div class="cert-avatar">${initials(cert.profiles?.nom, cert.profiles?.prenom)}</div>
          <div style="flex:1">
            <div class="cert-nom">${certName(cert)}</div>
            <div class="cert-email">${cert.profiles?.email ?? ''}</div>
            <div class="cert-date">Soumis le ${fmtDate(cert.created_at)}</div>
            ${cert.storage_path ? `<a href="https://sovelwnthvqtgtvxfpsj.supabase.co/storage/v1/object/public/certificats/${cert.storage_path}" target="_blank" class="btn-preview">👁 Voir le certificat</a>` : ''}
            <div class="cert-actions">
              <button class="btn-validate" onclick="openValidate('${cert.id}', '${certName(cert)}', '${cert.etudiant_id}')">✓ Valider</button>
              <button class="btn-refuse" onclick="openRefuse('${cert.id}', '${certName(cert)}')">✗ Refuser</button>
            </div>
          </div>
        </div>`).join('');
    }

    function renderDone() {
      const el = document.getElementById('done-list');
      if (doneCerts.length === 0) { el.innerHTML = ''; return; }
      el.innerHTML = doneCerts.map(cert => {
        const isValid = cert.statut === 'valide';
        return `
          <div class="done-card">
            <div class="cert-avatar done">${initials(cert.profiles?.nom, cert.profiles?.prenom)}</div>
            <div style="flex:1">
              <div class="cert-nom">${certName(cert)}</div>
              <div class="cert-date">${isValid ? 'Validé' : 'Refusé'} le ${fmtDate(cert.created_at)}</div>
            </div>
            <span class="validated-badge" style="${isValid ? '' : 'background:#FEE2E2;color:#DC2626'}">
              ${isValid ? '✅ Validé' : '❌ Refusé'}
            </span>
          </div>`;
      }).join('');
    }

    function openValidate(certId, name, etudiantId) {
      document.getElementById('modal-validate-title').textContent = `Valider le compte de ${name} ?`;
      const btn = document.getElementById('modal-validate-confirm');
      btn.onclick = async () => {
        closeModal('modal-validate');
        await sb.from('certificats').update({ statut: 'valide' }).eq('id', certId);
        await sb.from('profiles').update({ verified: true, badge: 'Étudiant vérifié' }).eq('id', etudiantId);
        pendingCerts = pendingCerts.filter(c => c.id !== certId);
        renderPending();
        toast('Compte validé ✓');
        await loadCerts();
      };
      document.getElementById('modal-validate').classList.remove('hidden');
    }

    function openRefuse(certId, name) {
      document.getElementById('modal-refuse-title').textContent = `Refuser le certificat de ${name} ?`;
      document.getElementById('motif-input').value = '';
      const btn = document.getElementById('modal-refuse-confirm');
      btn.onclick = async () => {
        const motif = document.getElementById('motif-input').value;
        closeModal('modal-refuse');
        await sb.from('certificats').update({ statut: 'refuse', motif_refus: motif }).eq('id', certId);
        pendingCerts = pendingCerts.filter(c => c.id !== certId);
        renderPending();
        toast('Certificat refusé');
        await loadCerts();
      };
      document.getElementById('modal-refuse').classList.remove('hidden');
    }

    (async () => {
      const auth = await requireAdmin();
      if (!auth) return;
      document.getElementById('sidebar-placeholder').innerHTML = sidebar('certificats');
      await loadCerts();
    })();
  </script>
</body>
</html>
