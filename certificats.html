</head>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>
    <div class="main-content">
      <header class="topbar">
        <div>
          <div class="page-title">Validation des documents</div>
          <div class="page-sub" id="pending-sub"></div>
        </div>
        <div class="topbar-right">
          <div class="admin-chip" id="admin-chip"></div>
        </div>
      </header>

      <main class="content">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('certs',this)">📄 Certificats étudiants</button>
          <button class="tab" onclick="switchTab('ids',this)">🪪 Pièces d'identité</button>
        </div>

        <!-- Tab: certificats -->
        <div class="tab-content active" id="tab-certs">
          <div class="section-label">En attente de validation</div>
          <div id="certs-pending"><div style="padding:20px;text-align:center;color:var(--sub);font-size:13px">Chargement…</div></div>
          <div class="sep"></div>
          <div class="section-label" style="margin-top:4px">Déjà traités (20 derniers)</div>
          <div id="certs-done"></div>
        </div>

        <!-- Tab: pièces d'identité -->
        <div class="tab-content" id="tab-ids">
          <div class="section-label">En attente de validation</div>
          <div id="ids-pending"><div style="padding:20px;text-align:center;color:var(--sub);font-size:13px">Chargement…</div></div>
          <div class="sep"></div>
          <div class="section-label" style="margin-top:4px">Déjà traités (20 derniers)</div>
          <div id="ids-done"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal image viewer -->
  <div class="modal-backdrop hidden" id="modal-image">
    <div class="modal modal-lg" style="max-width:760px">
      <div class="modal-header">
        <span class="modal-title">Aperçu du document</span>
        <div style="display:flex;align-items:center;gap:8px">
          <a class="btn btn-ghost btn-sm" id="modal-img-link" href="#" target="_blank" download>⬇ Télécharger</a>
          <button class="modal-close" onclick="document.getElementById('modal-image').classList.add('hidden')">✕</button>
        </div>
      </div>
      <div class="modal-body" style="text-align:center;padding:16px;background:var(--bg);border-radius:0 0 16px 16px">
        <img id="modal-img-el" src="" alt="Document"
             style="max-width:100%;max-height:74vh;border-radius:8px;object-fit:contain;box-shadow:0 4px 24px rgba(0,0,0,0.12)"
             onerror="this.alt='Image non disponible';this.style.height='120px'" />
      </div>
    </div>
  </div>

  <!-- Modal refus -->
  <div class="modal-backdrop hidden" id="modal-refuse">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Rejeter le document</span>
        <button class="modal-close" onclick="closeRefuse()">✕</button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px;color:var(--sub);margin-bottom:14px">Motif du refus (optionnel — transmis à l'utilisateur via ticket support)</p>
        <div class="form-group">
          <label class="form-label">Motif</label>
          <textarea class="form-textarea" id="motif-input" placeholder="Document illisible, mauvaise pièce justificative…" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeRefuse()">Annuler</button>
        <button class="btn btn-red" id="refuse-confirm-btn">Confirmer le rejet</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
  <script>
    let pendingRefuse = null; // { type, id, userId }

    function switchTab(id, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + id).classList.add('active');
    }

    function closeRefuse() { document.getElementById('modal-refuse').classList.add('hidden'); pendingRefuse = null; }

    function docCard(doc, type, userName, userEmail) {
      const bucket  = type === 'cert' ? 'certificats' : 'pieces-identite';
      const userId  = doc[type === 'cert' ? 'etudiant_id' : 'user_id'];
      const hasFile = !!doc.storage_path;
      // escape path for data-attribute (avoids quote-injection)
      const safePath = hasFile ? doc.storage_path.replace(/"/g, '&quot;') : '';
      return `
        <div class="doc-card">
          <div class="avatar" style="background:var(--primary-light);color:var(--primary);width:42px;height:42px;font-size:14px">
            ${initials(doc.profiles?.nom, doc.profiles?.prenom)}
          </div>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600;color:var(--text)">${userName}</div>
            <div style="font-size:12px;color:var(--sub);margin-top:2px">${userEmail}</div>
            <div style="font-size:12px;color:var(--sub);margin-top:2px">Soumis le ${fmtDate(doc.created_at)}</div>
            ${hasFile
              ? `<button class="btn btn-ghost btn-sm" style="margin-top:10px;gap:5px"
                   data-bucket="${bucket}" data-path="${safePath}"
                   onclick="viewDoc(this.dataset.bucket, this.dataset.path, this)">
                   👁 Voir le document
                 </button>`
              : '<div style="font-size:12px;color:var(--sub);margin-top:8px">Aucun fichier attaché</div>'
            }
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0">
            <button class="btn btn-green btn-sm" onclick="validate('${type}','${doc.id}','${userId}')">✓ Valider</button>
            <button class="btn btn-red btn-sm" onclick="openRefuse('${type}','${doc.id}','${userId}')">✗ Rejeter</button>
          </div>
        </div>`;
    }

    async function viewDoc(bucket, storagePath, btn) {
      const orig = btn.innerHTML;
      btn.disabled = true; btn.innerHTML = '<span class="spin-sm" style="border-top-color:var(--sub)"></span>';
      const { data, error } = await sb.storage.from(bucket).createSignedUrl(storagePath, 3600);
      btn.disabled = false; btn.innerHTML = orig;
      if (error || !data?.signedUrl) {
        toast('Impossible de charger le document' + (error?.message ? ' : ' + error.message : ''), 'error');
        return;
      }
      const ext = storagePath.split('.').pop().toLowerCase();
      const isImage = ['jpg','jpeg','png','webp','gif','heic','heif','bmp'].includes(ext);
      if (isImage) {
        const imgEl  = document.getElementById('modal-img-el');
        const linkEl = document.getElementById('modal-img-link');
        imgEl.src = '';          // reset before load to show spinner
        imgEl.src = data.signedUrl;
        linkEl.href = data.signedUrl;
        document.getElementById('modal-image').classList.remove('hidden');
      } else {
        // PDF or other: open in new tab
        window.open(data.signedUrl, '_blank');
      }
    }

    function doneCard(doc, type) {
      const isOk = doc.statut === 'valide';
      const name = `${doc.profiles?.prenom??''} ${doc.profiles?.nom??''}`.trim() || '—';
      return `
        <div class="doc-card" style="opacity:0.7">
          <div class="avatar" style="background:${isOk?'var(--green-light)':'var(--red-light)'};color:${isOk?'var(--green)':'var(--red)'};width:42px;height:42px;font-size:14px">
            ${initials(doc.profiles?.nom, doc.profiles?.prenom)}
          </div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${name}</div>
            <div style="font-size:12px;color:var(--sub)">${isOk?'Validé':'Refusé'} · ${fmtDate(doc.created_at)}</div>
            ${doc.motif_refus ? `<div style="font-size:12px;color:var(--red);margin-top:3px">Motif : ${doc.motif_refus}</div>` : ''}
          </div>
          <span class="badge ${isOk?'badge-green':'badge-red'}">${isOk?'✓ Validé':'✗ Refusé'}</span>
        </div>`;
    }

    function renderPending(containerId, docs, type) {
      const el = document.getElementById(containerId);
      if (!docs?.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">Aucun document en attente</div></div>`;
        return;
      }
      el.innerHTML = docs.map(d => {
        const name = `${d.profiles?.prenom??''} ${d.profiles?.nom??''}`.trim() || '—';
        const email = d.profiles?.email ?? '—';
        return docCard(d, type, name, email);
      }).join('');
    }

    function renderDone(containerId, docs, type) {
      const el = document.getElementById(containerId);
      if (!docs?.length) { el.innerHTML = ''; return; }
      el.innerHTML = docs.map(d => doneCard(d, type)).join('');
    }

    async function validate(type, docId, userId) {
      showSpinner();
      try {
        if (type === 'cert') {
          await sb.from('certificats').update({ statut: 'valide' }).eq('id', docId);
          await sb.from('profiles').update({ verified: true, badge: 'Étudiant vérifié' }).eq('id', userId);
        } else {
          await sb.from('pieces_identite').update({ statut: 'valide' }).eq('id', docId);
          await sb.from('profiles').update({ identity_verified: true }).eq('id', userId);
        }
        toast('Document validé avec succès ✓');
        await loadAll();
      } catch(e) { toast('Erreur : ' + e.message, 'error'); }
      hideSpinner();
    }

    function openRefuse(type, docId, userId) {
      pendingRefuse = { type, docId, userId };
      document.getElementById('motif-input').value = '';
      document.getElementById('modal-refuse').classList.remove('hidden');
      document.getElementById('refuse-confirm-btn').onclick = async () => {
        const motif = document.getElementById('motif-input').value.trim();
        closeRefuse();
        showSpinner();
        try {
          const table = pendingRefuse.type === 'cert' ? 'certificats' : 'pieces_identite';
          await sb.from(table).update({ statut: 'refuse', motif_refus: motif || null }).eq('id', pendingRefuse.docId);
          // Create support ticket with reason
          if (motif) {
            await sb.from('support_tickets').insert({
              user_id: pendingRefuse.userId,
              sujet: 'Document rejeté',
              message: motif,
              statut: 'ouvert',
            }).catch(() => {});
          }
          toast('Document rejeté');
          await loadAll();
        } catch(e) { toast('Erreur : ' + e.message, 'error'); }
        hideSpinner();
      };
    }

    async function loadAll() {
      const [
        { data: certsPending }, { data: certsDone },
        { data: idsPending, error: idsErr }, { data: idsDone },
      ] = await Promise.all([
        sb.from('certificats').select('*,profiles:etudiant_id(nom,prenom,email)').eq('statut','en_attente').order('created_at'),
        sb.from('certificats').select('*,profiles:etudiant_id(nom,prenom)').in('statut',['valide','refuse']).order('created_at',{ascending:false}).limit(20),
        sb.from('pieces_identite').select('*,profiles:user_id(nom,prenom,email)').eq('statut','en_attente').order('created_at').catch(()=>({data:[],error:true})),
        sb.from('pieces_identite').select('*,profiles:user_id(nom,prenom)').in('statut',['valide','refuse']).order('created_at',{ascending:false}).limit(20).catch(()=>({data:[]})),
      ]);

      const total = (certsPending?.length??0) + (idsPending?.length??0);
      document.getElementById('pending-sub').textContent = total > 0 ? `${total} document${total>1?'s':''} en attente` : 'Aucun document en attente';

      renderPending('certs-pending', certsPending, 'cert');
      renderDone('certs-done', certsDone, 'cert');

      if (idsErr) {
        document.getElementById('ids-pending').innerHTML = '<div class="empty-state"><div class="empty-icon">🪪</div><div class="empty-title">Table non configurée</div></div>';
        document.getElementById('ids-done').innerHTML = '';
      } else {
        renderPending('ids-pending', idsPending, 'id');
        renderDone('ids-done', idsDone, 'id');
      }
    }

    (async () => {
      const auth = await initPage('certificats');
      if (!auth) return;
      await loadAll();
    })();
  </script>
</body>
</html>
