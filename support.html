<div class="cde-shell">
  <div id="sidebar-placeholder"></div>
  <div class="cde-body" style="overflow:hidden">
    <div id="header-placeholder"></div>

    <!-- 3-column Intercom-like layout -->
    <div class="support-layout">

      <!-- Column 1 : Ticket list -->
      <div class="support-list">
        <div class="support-list-header">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-size:13px;font-weight:700;color:var(--text)">Conversations</div>
            <span class="badge badge-red" id="open-count">—</span>
          </div>
          <div class="search-box" style="max-width:100%">
            <span id="icon-search"></span>
            <input class="search-input" id="search" type="text" placeholder="Rechercher…" oninput="filterTickets()" />
          </div>
          <div style="display:flex;gap:4px;margin-top:8px">
            <button class="filter-chip active" style="font-size:10px;height:24px" onclick="setFilter(this,'')">Tous</button>
            <button class="filter-chip" style="font-size:10px;height:24px" onclick="setFilter(this,'ouvert')">Ouverts</button>
            <button class="filter-chip" style="font-size:10px;height:24px" onclick="setFilter(this,'en_cours')">En cours</button>
            <button class="filter-chip" style="font-size:10px;height:24px" onclick="setFilter(this,'resolu')">Résolus</button>
          </div>
        </div>
        <div class="support-list-body" id="ticket-list"></div>
      </div>

      <!-- Column 2 : Chat -->
      <div class="support-chat">
        <div class="support-chat-header" id="chat-header">
          <div style="color:var(--text-4);font-size:12.5px">← Sélectionnez un ticket</div>
        </div>
        <div class="support-chat-body" id="chat-body"></div>
        <div class="support-chat-footer" id="chat-footer" style="display:none">
          <div class="msg-input-wrap">
            <textarea class="msg-input" id="msg-input" placeholder="Répondre au client…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button class="btn btn-primary btn-icon" onclick="sendMsg()" title="Envoyer">
              <span id="icon-send"></span>
            </button>
          </div>
          <div class="msg-quick-replies">
            <button class="msg-quick-reply" onclick="useReply('Bonjour, merci de nous avoir contactés. Nous examinons votre demande.')">Réponse d\'accueil</button>
            <button class="msg-quick-reply" onclick="useReply('Votre problème a bien été noté. Notre équipe vous revient dans les 24h.')">24h SLA</button>
            <button class="msg-quick-reply" onclick="useReply('Votre ticket est maintenant résolu. N\'hésitez pas à nous recontacter si besoin.')">Clôturer</button>
          </div>
        </div>
      </div>

      <!-- Column 3 : User info -->
      <div class="support-sidebar" id="user-sidebar">
        <div class="support-sidebar-section">
          <div style="text-align:center;color:var(--text-4);font-size:12px;padding:16px 0">
            Sélectionnez un ticket
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="mock-data.js"></script>
<script src="components.js"></script>
<script>
let allTickets = [], filtered = [], activeFilter = '', selectedTicket = null;
const PRIO_COLOR = { haute: 'var(--red)', normale: 'var(--orange)', basse: 'var(--text-4)' };

function setFilter(btn, f) {
  activeFilter = f;
  document.querySelectorAll('.support-list-header .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterTickets();
}
function filterTickets() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  filtered = allTickets.filter(t => {
    if (activeFilter && t.statut !== activeFilter) return false;
    if (q && !`${t.user_prenom} ${t.user_nom} ${t.sujet}`.toLowerCase().includes(q)) return false;
    return true;
  });
  renderList();
}
function renderList() {
  const open = allTickets.filter(t => t.statut === 'ouvert').length;
  document.getElementById('open-count').textContent = open;
  const el = document.getElementById('ticket-list');
  if (!filtered.length) { el.innerHTML = `<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">Aucun ticket</div></div>`; return; }
  el.innerHTML = filtered.map(t => {
    const active = selectedTicket?.id === t.id;
    const unread = t.statut === 'ouvert';
    return `<div class="support-ticket-item${active ? ' active' : ''}" onclick="openTicket('${t.id}')">
      <div class="support-ticket-item-header">
        ${unread ? '<span class="support-unread-dot"></span>' : ''}
        <span class="support-ticket-item-name">${t.user_prenom} ${t.user_nom}</span>
        <span class="support-ticket-item-time">${fmtTimeAgo(t.last_reply)}</span>
      </div>
      <div class="support-ticket-item-subject">${t.sujet}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px">
        ${statusBadge(t.statut)}
        <span style="font-size:9px;font-weight:700;color:${PRIO_COLOR[t.priorite]};text-transform:uppercase">${t.priorite}</span>
      </div>
    </div>`;
  }).join('');
}

function openTicket(id) {
  selectedTicket = allTickets.find(t => t.id === id);
  if (!selectedTicket) return;
  const t = selectedTicket;
  renderList();

  /* Chat header */
  document.getElementById('chat-header').innerHTML = `
    <div>${avatarHTML(t.user_prenom, t.user_nom, 'sm')}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:700;color:var(--text)">${t.user_prenom} ${t.user_nom}</div>
      <div style="font-size:11px;color:var(--text-3)">${t.sujet}</div>
    </div>
    ${statusBadge(t.statut)}
    <button class="btn btn-green btn-sm" onclick="resolveTicket()" ${t.statut === 'resolu' ? 'disabled' : ''}>✓ Résoudre</button>
    <button class="btn btn-ghost btn-sm" onclick="togglePrio()" title="Priorité">🔴 ${t.priorite}</button>
  `;

  /* Messages */
  const body = document.getElementById('chat-body');
  body.innerHTML = '';

  const allMsgs = [
    { is_admin: false, message: t.message, created_at: t.created_at },
    ...t.messages.slice(1),
  ];
  allMsgs.forEach(m => {
    const wrap = document.createElement('div');
    wrap.className = `msg-bubble-wrap${m.is_admin ? ' admin-msg' : ''}`;
    wrap.innerHTML = `
      ${!m.is_admin ? avatarHTML(t.user_prenom, t.user_nom, 'xs') : ''}
      <div class="msg-bubble ${m.is_admin ? 'admin-msg' : 'user-msg'}">${m.message}</div>
      ${m.is_admin ? avatarHTML('CDE','Admin','xs','background:#1E3A5F;color:#7FB3E8') : ''}
    `;
    body.appendChild(wrap);
    const timeEl = document.createElement('div');
    timeEl.className = 'msg-time-label';
    timeEl.textContent = fmtDateTime(m.created_at);
    body.appendChild(timeEl);
  });

  body.scrollTop = body.scrollHeight;
  document.getElementById('chat-footer').style.display = t.statut === 'resolu' ? 'none' : '';

  /* Sidebar */
  const user = MOCK.USERS.find(u => u.id === t.user_id) || {};
  const userAnn = MOCK.ANNONCES.filter(a => a.auteur_id === t.user_id).length;
  document.getElementById('user-sidebar').innerHTML = `
    <div class="support-sidebar-section" style="text-align:center;padding:20px 16px">
      ${avatarHTML(t.user_prenom, t.user_nom, 'xl', 'margin:0 auto 10px')}
      <div style="font-size:14px;font-weight:700;color:var(--text)">${t.user_prenom} ${t.user_nom}</div>
      <div style="font-size:11.5px;color:var(--text-3);margin-top:2px">${t.user_email}</div>
      <div style="margin-top:8px">${roleBadge(user.role || 'etudiant')}</div>
    </div>
    <div class="support-sidebar-section">
      <div class="support-sidebar-title">Ticket</div>
      <div class="info-list">
        <div class="info-row"><span class="info-row-key">Statut</span><span class="info-row-value">${statusBadge(t.statut)}</span></div>
        <div class="info-row"><span class="info-row-key">Priorité</span><span class="info-row-value" style="color:${PRIO_COLOR[t.priorite]};font-weight:700;text-transform:capitalize">${t.priorite}</span></div>
        <div class="info-row"><span class="info-row-key">Ouvert le</span><span class="info-row-value">${fmtDate(t.created_at)}</span></div>
        <div class="info-row"><span class="info-row-key">Dernière rép.</span><span class="info-row-value">${fmtTimeAgo(t.last_reply)}</span></div>
      </div>
    </div>
    <div class="support-sidebar-section">
      <div class="support-sidebar-title">Utilisateur</div>
      <div class="info-list">
        <div class="info-row"><span class="info-row-key">Téléphone</span><span class="info-row-value">${user.telephone || '—'}</span></div>
        <div class="info-row"><span class="info-row-key">SMS vérifié</span><span class="info-row-value">${user.verified ? '✅ Oui' : '❌ Non'}</span></div>
        <div class="info-row"><span class="info-row-key">Inscrit le</span><span class="info-row-value">${fmtDate(user.created_at)}</span></div>
        <div class="info-row"><span class="info-row-key">Annonces</span><span class="info-row-value">${userAnn}</span></div>
      </div>
    </div>
    <div class="support-sidebar-section">
      <a class="btn btn-ghost btn-sm" href="utilisateurs.html" style="width:100%">Voir profil complet →</a>
    </div>
  `;
}

function sendMsg() {
  if (!selectedTicket) return;
  const input = document.getElementById('msg-input');
  const msg = input.value.trim();
  if (!msg) return;
  const newMsg = { is_admin: true, message: msg, created_at: new Date().toISOString() };
  selectedTicket.messages.push(newMsg);
  const idx = allTickets.findIndex(t => t.id === selectedTicket.id);
  if (idx !== -1) { allTickets[idx].statut = 'en_cours'; allTickets[idx].last_reply = newMsg.created_at; selectedTicket.statut = 'en_cours'; }
  input.value = ''; input.style.height = 'auto';
  openTicket(selectedTicket.id);
  toast('Réponse envoyée ✓');
}

function useReply(text) { document.getElementById('msg-input').value = text; document.getElementById('msg-input').focus(); }

function resolveTicket() {
  if (!selectedTicket) return;
  showConfirm('Marquer ce ticket comme résolu ?', () => {
    const idx = allTickets.findIndex(t => t.id === selectedTicket.id);
    if (idx !== -1) allTickets[idx].statut = 'resolu';
    selectedTicket.statut = 'resolu';
    toast('Ticket résolu ✓');
    openTicket(selectedTicket.id);
    filterTickets();
  }, { label: 'Résoudre' });
}

function togglePrio() {
  if (!selectedTicket) return;
  const prios = ['haute','normale','basse'];
  const next = prios[(prios.indexOf(selectedTicket.priorite) + 1) % prios.length];
  selectedTicket.priorite = next;
  const idx = allTickets.findIndex(t => t.id === selectedTicket.id);
  if (idx !== -1) allTickets[idx].priorite = next;
  toast(`Priorité : ${next}`, 'info');
  openTicket(selectedTicket.id);
}

(async () => {
  await initPage('support');
  document.getElementById('icon-search').innerHTML = ICONS.search;
  document.getElementById('icon-send').innerHTML   = ICONS.send;
  allTickets = MOCK.TICKETS;
  filterTickets();
  if (allTickets.length) openTicket(allTickets[0].id);
})();
</script>
</body>
</html>
